syntax = "proto3";

package examlytics.v1;

option go_package = "github.com/examlytics/server/pkg/proto/examlytics/v1;examlyticsv1";

// Improved service definition for better maintainability
service ExamlyticsAI {
  // Generates a new exam based on user criteria
  rpc GenerateExam(GenerateExamRequest) returns (GenerateExamResponse);

  // Analyzes a submitted exam and provides detailed feedback
  rpc AnalyzeExam(AnalyzeExamRequest) returns (AnalyzeExamResponse);

  // Streamed explanation generation for better UX
  rpc StreamExplanation(ExplanationRequest) returns (stream ExplanationResponse);

  // Predicts user performance based on history
  rpc PredictPerformance(PredictPerformanceRequest) returns (PredictPerformanceResponse);
}

// --- Common Messages ---

message DifficultyConfig {
  int32 easy = 1;
  int32 medium = 2;
  int32 hard = 3;
}

// --- Generate Exam ---

message GenerateExamRequest {
  string user_id = 1;
  string exam_type = 2; // JOB, CODING, ACADEMIC
  string mode = 3;      // MCQ, SUBJECTIVE, MIXED
  int32 question_count = 4;
  DifficultyConfig difficulty = 5;
  repeated string topics = 6;
  string job_category = 7;
  repeated string subjects = 8;
}

message QuestionItem {
  string id = 1;
  string text = 2;
  repeated string options = 3;
  string type = 4; // MCQ, CODING
  string difficulty = 5;
  string topic = 6;
  string correct_answer = 7; // Only for backend use, maybe redundant if handled by AI
  string explanation = 8;
}

message GenerateExamResponse {
  string exam_id = 1;
  repeated QuestionItem questions = 2;
  int32 time_limit = 3; // in seconds
}

// --- Analyze Exam ---

message ResponseItem {
  string question_id = 1;
  string answer = 2;
  int32 time_spent = 3;
}

message AnalyzeExamRequest {
  string exam_id = 1;
  string user_id = 2;
  repeated ResponseItem responses = 3;
}

message TopicAnalysisItem {
  string topic_name = 1;
  double accuracy = 2;
  string status = 3; // WEAK, STRONG, AVERAGE
}

message ImprovementItem {
  string topic_name = 1;
  string strategy = 2;
  int32 practice_days = 3;
}

message AnalyzeExamResponse {
  double score = 1;
  double accuracy = 2;
  double estimated_percentile = 3;
  repeated TopicAnalysisItem topic_analysis = 4;
  repeated string weak_topics = 5;
  repeated ImprovementItem improvement_plan = 6;
}

// --- Stream Explanation ---

message ExplanationRequest {
    string question_id = 1;
    string user_answer = 2;
    string context = 3;
}

message ExplanationResponse {
    string chunk = 1;
}

// --- Predict Performance ---

message PredictPerformanceRequest {
    string user_id = 1;
    string target_exam = 2; // e.g., "JEE Advanced"
}

message PredictPerformanceResponse {
    double predicted_score = 1;
    double confidence_score = 2; // 0.0 to 1.0
    string risk_level = 3; // LOW, MODERATE, HIGH
}
