services:
  ai-service:
    container_name: ai-service
    build:
      context: ./ai-service
    ports:
      - "8001:8001"
    volumes:
      - ./ai-service:/app
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
    # Override the default CMD to enable hot reloading
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload


  redis:
    container_name: redis
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    container_name: server
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - go-modules:/go/pkg/mod
    environment:
      - CGO_ENABLED=0
      - REDIS_URL=redis://redis:6379/0

  client:
    container_name: examlytics-client
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    shm_size: '1gb'
    environment:
      - WATCHPACK_POLLING=true

volumes:
  go-modules:
  redis_data:
