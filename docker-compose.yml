services:
  ai-service:
    build:
      context: ./ai-service
    ports:
      - "8001:8001"
    volumes:
      - ./ai-service:/app
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
    # Override the default CMD to enable hot reloading
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload



  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server-go:
    image: golang:1.24-alpine
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./server-go:/app
      - go-modules:/go/pkg/mod
    environment:
      - CGO_ENABLED=0
      - REDIS_URL=redis://redis:6379/0
    # Install air for hot reloading and run it
    command: sh -c "go install github.com/air-verse/air@v1.61.1 && air"

  client:
    image: node:20-slim
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    # Ensure dependencies are installed and run dev server
    command: sh -c "npm install && npm run dev"

volumes:
  go-modules:
  redis_data:
