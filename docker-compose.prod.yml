version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    ports:
      - "8080:8080"
    environment:
      - DB_URL=postgres://user:pass@db:5432/examlytics
      - REDIS_URL=redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - db
      - redis
    networks:
      - examlytics-net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_URL=postgresql://user:pass@db:5432/examlytics
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - examlytics-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://server:8080
      - NEXT_PUBLIC_AI_SERVICE_URL=http://ai-service:8000
    networks:
      - examlytics-net

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=examlytics
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - examlytics-net

  redis:
    image: redis:7-alpine
    networks:
      - examlytics-net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - examlytics-net

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - examlytics-net

networks:
  examlytics-net:
    driver: bridge

volumes:
  pgdata:
